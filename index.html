<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monochrome Ltd</title>
  <meta name="description" content="Monochrome Ltd — Creative technology studio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Playfair Display', Georgia, serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .logo {
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      user-select: none;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2.2rem;
      color: #fff;
      text-decoration: none;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      letter-spacing: 0.12em;
      text-transform: none;
      transition: all 0.4s ease;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    .cta:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <h1 class="logo">mono.</h1>
    <a href="mailto:contact@mono.pub" class="cta">get in touch</a>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h;
    let shapes = [];
    const SHAPE_COUNT = 18;

    function resize() {
      w = canvas.width = window.innerWidth * devicePixelRatio;
      h = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }

    class Shape {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = (Math.random() * 200 + 100) * devicePixelRatio;
        this.opacity = Math.random() * 0.04 + 0.02;
        this.rotation = Math.random() * Math.PI * 2;
        this.sides = Math.floor(Math.random() * 4) + 3; // 3-6 sides
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.vr = (Math.random() - 0.5) * 0.003;
        this.morphPhase = Math.random() * Math.PI * 2;
        this.morphSpeed = Math.random() * 0.003 + 0.001;
        this.sizePhase = Math.random() * Math.PI * 2;
        this.sizeSpeed = Math.random() * 0.002 + 0.0005;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.vr;
        this.morphPhase += this.morphSpeed;
        this.sizePhase += this.sizeSpeed;

        // Wrap around edges with padding
        const pad = this.size * 2;
        if (this.x < -pad) this.x = w + pad;
        if (this.x > w + pad) this.x = -pad;
        if (this.y < -pad) this.y = h + pad;
        if (this.y > h + pad) this.y = -pad;
      }

      draw(ctx) {
        const currentSize = this.size + Math.sin(this.sizePhase) * this.size * 0.3;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1 * devicePixelRatio;
        ctx.beginPath();

        for (let i = 0; i <= this.sides; i++) {
          const angle = (i / this.sides) * Math.PI * 2;
          const morph = 1 + Math.sin(this.morphPhase + i * 1.5) * 0.35;
          const r = currentSize * morph;
          const px = Math.cos(angle) * r;
          const py = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }

        ctx.closePath();
        ctx.stroke();

        // Subtle fill
        ctx.globalAlpha = this.opacity * 0.3;
        ctx.fillStyle = '#fff';
        ctx.fill();

        ctx.restore();
      }
    }

    function init() {
      resize();
      shapes = [];
      for (let i = 0; i < SHAPE_COUNT; i++) {
        shapes.push(new Shape());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      for (const shape of shapes) {
        shape.update();
        shape.draw(ctx);
      }
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
    });

    init();
    animate();
  </script>
</body>
</html>
